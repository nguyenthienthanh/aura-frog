name: Aura Frog CI

on:
  push:
    branches: [main, v*]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate TOON format
        run: bash aura-frog/scripts/ci/validate-toon.sh

      - name: Validate config
        run: bash aura-frog/scripts/ci/validate-config.sh

      - name: Validate counts consistency
        run: bash aura-frog/scripts/ci/validate-counts.sh

      - name: Check for broken markdown links
        # Scan README.md, MIGRATION_TO_V3.7.md, CONTRIBUTING.md, docs/**/*.md
        # AND aura-frog/**/*.md. For each `](path)` link that isn't
        # http://, https://, # (anchor), or mailto:, assert the target
        # exists either relative to the link's containing file OR relative
        # to the repo root. Strip ?query and #anchor from the path. Path
        # extensions: .md, .json, .yaml, .yml, .sh, .cjs, .js, dir.
        run: |
          set -euo pipefail
          errors=0
          while IFS= read -r file; do
            while IFS= read -r link; do
              [ -z "$link" ] && continue
              # Strip ?query and #fragment for filesystem checks.
              clean="${link%%#*}"
              clean="${clean%%\?*}"
              [ -z "$clean" ] && continue
              dir=$(dirname "$file")
              target="$dir/$clean"
              if [ ! -e "$target" ] && [ ! -e "$clean" ]; then
                echo "Broken link in $file: $link"
                errors=$((errors + 1))
              fi
            done < <(grep -oP '\]\((?!http|#|mailto)([^)]+)\)' "$file" 2>/dev/null | sed 's/\](//' | sed 's/)//' || true)
          done < <(
            find aura-frog -name "*.md" -not -path "*/node_modules/*"
            find docs -name "*.md" 2>/dev/null
            ls README.md MIGRATION_TO_V3.7.md CONTRIBUTING.md 2>/dev/null
          )
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors broken link(s)"
            exit 1
          fi
          echo "Link check complete: 0 broken"

      - name: Validate README counts vs stats.json
        # Surgical check that flags stale summary counts in user-facing docs
        # (table cells, link labels, banner lines). Doesn't flag narrative
        # prose. Covers what validate-counts.sh misses (it only scans
        # plugin.json + CLAUDE.md).
        run: bash aura-frog/scripts/ci/validate-readme-counts.sh

      - name: Validate docs syntax (no pre-v3.7 commands)
        # Blocks stale `workflow:start`, `agent:list`, `bugfix:quick`,
        # `learn:*`, `project:reload-env`, and pre-v3.7 verb forms from
        # re-entering docs/. Companion to scripts/audit/stale-cmd-check.sh
        # (broader audit). Spec: FEAT-006 STORY-0005 (v3.7.4).
        run: bash aura-frog/scripts/ci/validate-docs-syntax.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Full matrix restored after root-cause fix in hooks/lib/safe-stdin.cjs
        # (Node 20/22 Ubuntu hang was `fs.readFileSync(0)` blocking on
        # non-pipe stdin — fixed with fstatSync gate + watchdog).
        node-version: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dev dependencies
        run: npm install

      - name: Run tests with coverage gate
        # `npm test -- --coverage` enforces the threshold in jest.config.cjs.
        # CI fails if any of statements / branches / functions / lines drops
        # below the floor. Tracks no-regression discipline.
        run: npm test -- --coverage

      - name: Security audit (advisory)
        run: npm audit --audit-level=high || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dev dependencies
        run: npm install

      - name: Lint hooks
        run: npm run lint

  stats:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats.json
        run: bash aura-frog/scripts/ci/generate-stats.sh

      - name: Commit stats.json if changed
        run: |
          cd aura-frog
          if ! git diff --quiet stats.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add stats.json
            git commit -m "chore: auto-update stats.json [skip ci]"
            git push
          fi
